AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: CaseReady — AI surgical coordination API

Parameters:
  Environment:
    Type: String
    Default: staging
    AllowedValues: [staging, production]
  ImageUri:
    Type: String
    Description: ECR image URI to deploy

Globals:
  Function:
    Timeout: 120
    MemorySize: 512

Resources:

  CaseReadyFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "caseready-api-${Environment}"
      PackageType: Image
      ImageUri: !Ref ImageUri
      Description: CaseReady surgery briefing agent — FastAPI on Lambda
      Environment:
        Variables:
          ANTHROPIC_API_KEY: "{{resolve:secretsmanager:caseready/anthropic-key}}"
          CASEREADY_API_KEY: "{{resolve:secretsmanager:caseready/api-secret}}"
      Events:
        ApiRoot:
          Type: HttpApi
          Properties:
            ApiId: !Ref CaseReadyHttpApi
            Path: /
            Method: ANY
        ApiProxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref CaseReadyHttpApi
            Path: /{proxy+}
            Method: ANY
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowOrigins:
            - "*"
          AllowMethods:
            - GET
            - POST
          AllowHeaders:
            - Content-Type
            - X-API-Key
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
            Resource:
              - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:caseready/*"

  CaseReadyHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - POST
        AllowHeaders:
          - Content-Type
          - X-API-Key

  CaseReadyLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/caseready-api-${Environment}"
      RetentionInDays: 90

Outputs:
  ApiUrl:
    Description: CaseReady API base URL
    Value: !Sub "https://${CaseReadyHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
    Export:
      Name: !Sub "CaseReadyApiUrl-${Environment}"

  FunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt CaseReadyFunction.Arn

  FunctionUrl:
    Description: Lambda Function URL (no timeout — use this for /brief)
    Value: !GetAtt CaseReadyFunctionUrl.FunctionUrl
    Export:
      Name: !Sub "CaseReadyFunctionUrl-${Environment}"
